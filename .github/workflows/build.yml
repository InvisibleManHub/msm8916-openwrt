name: OpenWrt Builder

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Target device (all = build all devices)'
        required: false
        type: choice
        default: mf68e
        options:
          - all
          - uz801
          - uf02
          - mf68e

env:
  UPLOAD_FIRMWARE: true
  TZ: Europe/Madrid

jobs:
  resolve-version:
    runs-on: ubuntu-22.04
    outputs:
      openwrt_version: ${{ steps.resolve.outputs.version }}
    steps:
    - name: Resolve latest stable OpenWrt 24.10.x tag
      id: resolve
      run: |
        VERSION=$(git ls-remote --tags https://openwrt.org 'v24.10.*' \

          | grep -oP 'v24\.10\.\d+$' | sort -V | tail -1)
        if [ -z "$VERSION" ]; then
          echo "ERROR: Could not resolve a stable OpenWrt 24.10.x version"
          exit 1
        fi
        echo "Resolved OpenWrt version: $VERSION"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: resolve-version
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON((inputs.device == 'all' || inputs.device == '') && '["uz801","uf02","mf68e"]' || format('["{0}"]', inputs.device)) }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E ./devenv/dependencies.sh
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone OpenWrt source code
      run: |
        echo "Using OpenWrt ${{ needs.resolve-version.outputs.openwrt_version }}"
        git clone https://openwrt.org openwrt
        git -C openwrt checkout ${{ needs.resolve-version.outputs.openwrt_version }}

    - name: Load msm89xx target and packages
      run: |
        chmod +x apply_patches.sh
        ./apply_patches.sh openwrt
        mv msm89xx openwrt/target/linux/msm89xx
        mv packages openwrt/package/msm8916

    - name: Re-integrate MF68E device target into OpenWrt build system
      run: |
        # Принудительно регистрируем профиль устройства в сборочном Makefile архитектуры
        TARGET_MK="openwrt/target/linux/msm89xx/image/msm8916.mk"
        if [ -f "$TARGET_MK" ]; then
          echo -e "\n\ndefine Device/generic-mf68e\n  DEVICE_VENDOR := ZTE\n  DEVICE_MODEL := MF68E / M9S\n  DEVICE_DTS := qcom-msm8916-zte-mf68e\nendef\nTARGET_DEVICES += generic-mf68e" >> "$TARGET_MK"
        fi

    - name: Update and install feeds
      run: |
        cd openwrt
        rm -rf tmp
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load diffconfig
      run: |
        DEVICE="${{ matrix.device }}"
        mkdir -p openwrt
        
        if [ "$DEVICE" = "mf68e" ]; then
          # Проверяем точный путь к файлу конфигурации в вашем репозитории
          if [ -f "TBR/diffconfig_mf68e" ]; then
            cp "TBR/diffconfig_mf68e" openwrt/.config
          elif [ -f "TBR/mf68e/diffconfig_mf68e" ]; then
            cp "TBR/mf68e/diffconfig_mf68e" openwrt/.config
          elif [ -f "diffconfig_mf68e" ]; then
            cp "diffconfig_mf68e" openwrt/.config
          else
            echo "ERROR: diffconfig_mf68e not found!" && exit 1
          fi
        else
          DIFFCONFIG="diffconfig_${DEVICE}"
          if [ -f "$DIFFCONFIG" ]; then
            mv "$DIFFCONFIG" openwrt/.config
          else
            echo "ERROR: $DIFFCONFIG not found!" && exit 1
          fi
        fi

    - name: Download package
      id: package
      run: |
        cd openwrt
        rm -rf tmp
        make defconfig
        # Автоматически прописываем ответы на интерактивные вопросы конфигуратора для ядра 6.6
        make target/linux/refresh
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \; || true

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled() && steps.compile.outputs.status == 'success'
      run: |
        # Проверяем строго папку архитектуры Qualcomm msm89xx
        if [ -d "openwrt/bin/targets/msm89xx/msm8916" ]; then
          cd openwrt/bin/targets/msm89xx/msm8916
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "ERROR: Target firmware directory msm89xx/msm8916 does not exist!"
          exit 1
        fi

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: openwrt_firmware_${{ matrix.device }}_${{ needs.resolve-version.outputs.openwrt_version }}_${{ env.FILE_DATE }}
        path: |
          ${{ env.FIRMWARE }}/openwrt-msm89xx-*-squashfs-gpt_both0.bin
          ${{ env.FIRMWARE }}/openwrt-msm89xx-*-squashfs-boot.img
          ${{ env.FIRMWARE }}/openwrt-msm89xx-*-squashfs-system.img
          ${{ env.FIRMWARE }}/openwrt-msm89xx-*.manifest
          ${{ env.FIRMWARE }}/openwrt-msm89xx-*-flash.sh
          ${{ env.FIRMWARE }}/openwrt-msm89xx-*-firmware.zip
